  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

width: 5px; height: 5px; background: var(--gold); border-radius: 50%; }\n\n.secoes ul { list-style: none; display: flex; align-items: center; gap: 0.2rem; }\n.secoes ul li a {\n  position: relative; display: inline-block; text-decoration: none;\n  padding: 0.6rem 1.4rem; font-size: 1.25rem; font-weight: 600;\n  color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase;\n  transition: color 200ms ease;\n}\n.secoes ul li a::after {\n  content: ''; position: absolute; bottom: -1px; left: 50%;\n  width: 0; height: 2px; background: var(--blue);\n  transition: width 260ms ease, left 260ms ease;\n}\n.secoes ul li a:hover { color: #fff; }\n.secoes ul li a:hover::after { width: calc(100% - 2.8rem); left: 1.4rem; }\n.secoes ul li a.active { color: #fff; }\n.secoes ul li a.active::after { width: calc(100% - 2.8rem); left: 1.4rem; }\n\n.nav-cta {\n  margin-left: 1.2rem;\n  background: var(--blue) !important; color: #fff !important;\n  border-radius: 4px; padding: 0.7rem 2rem !important;\n  transition: background 200ms ease, box-shadow 200ms ease !important;\n}\n.nav-cta::after { display: none !important; }\n.nav-cta:hover { background: var(--blue-dark) !important; box-shadow: 0 4px 20px rgba(65,105,225,0.45) !important; }\n\n/* ── SHARED SECTION ── */\n.section { position: relative; min-height: 100vh; }\n.section-inner { max-width: 1280px; margin: 0 auto; padding: 12rem 5rem 8rem; position: relative; z-index: 2; }\n\n/* ── HERO / PROFILE ── */\n#profile-section {\n  background: var(--dark);\n  display: flex; align-items: center; overflow: hidden;\n}\n\n/* Radial glow behind hero */\n#profile-section::after {\n  content: ''; position: absolute;\n  top: -200px; left: -200px;\n  width: 900px; height: 900px;\n  background: radial-gradient(ellipse, rgba(65,105,225,0.18) 0%, transparent 70%);\n  pointer-events: none; z-index: 1;\n  animation: pulse-glow 8s ease-in-out infinite alternate;\n}\n@keyframes pulse-glow {\n  from { transform: scale(1) translate(0, 0); opacity: te; inset: 0; pointer-events: none; z-index: 0;\n  background: repeating-linear-gradient(\n    -55deg,\n    transparent, transparent 60px,\n    rgba(65,105,225,0.025) 60px, rgba(65,105,225,0.025) 61px\n  );\n}\n\n.edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }\n.edu-card {\n  background: rgba(255,255,255,0.03);\n  border: 1px solid var(--border);\n  border-top: 2px solid var(--gold);\n  padding: 3rem; border-radius: 6px;\n  transition: background 250ms ease, border-color 250ms ease, transform 250ms ease;\n}\n.edu-card:hover { background: rgba(201,168,76,0.06); border-color: rgba(201,168,76,0.5); transform: translateY(-3px); }\n.edu-card-tag {\n  font-size: 1.05rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;\n  color: var(--gold); margin-bottom: 1rem;\n}\n.edu-card h2 {\n  font-family: 'Montserrat', sans-serif; font-size: 2.2rem;\n  font-weight: 700; text-transform: uppercase; color: #fff; margin-bottom: 0.8rem;\n}\n.edu-card p { font-size: 1.5rem; color: var(--muted); line-height: 1.6; }\n.edu-card .edu-status {\n  margin-top: 1.6rem; display: inline-block; font-size: 1.1rem; font-weight: 600;\n  letter-spacing: 0.07em; text-transform: uppercase;\n  padding: 3px 10px; border-radius: 3px;\n}\n.status-ongoing { background: rgba(65,105,225,0.15); color: #6b8ff5; }\n.status-done    { background: rgba(72,187,120,0.12); color: #48bb78; }\n\n/* ── TECHNOLOGIES ── */\n#tech-section {\n  background: #080b14;\n  position: relative; overflow: hidden;\n}\n/* right-side glow */\n#tech-section::after {\n  content: ''; position: absolute; right: -200px; top: 50%;\n  transform: translateY(-50%);\n  width: 700px; height: 700px;\n  background: radial-gradient(ellipse, rgba(65,105,225,0.12) 0%, transparent 65%);\n  pointer-events: none;\n}\n\n.tech-grid {\n  display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; max-width: 760px;\n}\n.tech-card {\n  display: flex; flex-direction: column; align-items: center; justify-content: center;\n  padding: 3rem 2rem; border: 1px solid var(--border); border-radius: 8px;\n  background: rgba(255,255,255,0.02); cursor: pointer;\n  transition: background 300ms ease, border-color 300ms ease, transform 300ms ease, box-shadow 300ms ease;\n}\n.tech-grid:hover .tech-card:not(:hover) { opacity: 0.3; transform: scale(0.97); }\n.tech-card:hover {\n  background: rgba(65,105,225,0.1); border-color: rgba(65,105,225,0.5);\n  transform: scale(1.06); box-shadow: 0 8px 32px rgba(65,105,225,0.2);\n}\n.tech-icon {\n  font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 2.8rem;\n  color: var(--blue); margin-bottom: 1.2rem; letter-spacing: -0.02em;\n}\n.tech-name { font-size: 1.3rem; color: var(--muted); text-align: center; letter-spacing: 0.04em; }\n\n/* ── CONTACT ── */\n#contact-section {\n  background: var(--dark);\n  position: relative; overflow: hidden;\n}\n#contact-section::before {\n  content: ''; position: absolute; bottom: -300px; right: -200px;\n  width: 800px; height: 800px;\n  background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 65%);\n  pointer-events: none;\n}\n\n.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8rem; align-items: start; }\n.contact-info { padding-top: 1rem; }\n.contact-info p { font-size: 1.6rem; color: var(--muted); line-height: 1.8; margin-bottom: 3rem; }\n\n.contact-links { display: flex; flex-direction: column; gap: 1.2rem; }\n.contact-link {\n  display: flex; align-items: center; gap: 1.2rem;\n  font-size: 1.5rem; color: var(--muted); text-decoration: none;\n  transition: color 200ms ease;\n}\n.contact-link:hover { color: #fff; }\n.contact-link-icon {\n  width: 3.6rem; height: 3.6rem; border-radius: 6px;\n  background: rgba(65,105,225,0.12); border: 1px solid rgba(65,105,225,0.2);\n  display: flex; align-items: center; justify-content: center;\n  font-size: 1.6rem; flex-shrink: 0;\n}\n\n/* Form */\n.contact-form { display: flex; flex-direction: column; gap: 0; }\n.form-field { posi
