<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 62.5%; }
body { font-family: 'Montserrat', sans-serif; background: #fff; padding: 20px 24px; }
.row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid #f0f0f0; padding: 8px 0; }
.row:last-child { border-bottom: none; }
.label { font-size: 10px; color: #999; min-width: 60px; font-family: monospace; }
.specimen { font-weight: 700; text-transform: uppercase; color: #000; line-height: 1.2; }
.h1 { font-size: 6rem; }
.h2 { font-size: 5.5rem; }
.h3 { font-size: 5rem; }
.h4 { font-size: 4.5rem; }
.h5 { font-size: 4rem; }
.h6 { font-size: 3.5rem; }
</style></head>
<body>
  <div class="row"><span class="label">H1 · 60px</span><div class="specimen h1">Montserrat Bold</div></div>
  <div class="row"><span class="label">H2 · 60px</span><div class="specimen h2">Heading Two</div></div>
  <div class="row"><span class="label">H3 · 50px</span><div class="specimen h3">Heading Three</div></div>
  <div class="row"><span class="label">H4 · 45px</span><div class="specimen h4">Heading Four</div></div>
  <div class="row"><span class="label">H5 · 40px</span><div class="specimen h5">Heading Five</div></div>
  <div class="row"><span class="label">H6 · 35px</span><div class="specimen h6">Heading Six</div></div>
</body></html>
