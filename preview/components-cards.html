<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 62.5%; }
body { font-family: 'Open Sans', sans-serif; background: #f0f0f0; padding: 16px; display: flex; gap: 16px; flex-wrap: wrap; }

.experience-card { background: rgba(0,0,0,0.85); padding: 2rem 2.5rem; border-radius: 3rem; color: #fff; max-width: 300px; }
.experience-card h2 { font-family: 'Montserrat', sans-serif; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 1rem; color: #fff; }
.experience-card p { font-size: 1.5rem; color: #c9d1d9; line-height: 1.5; margin-bottom: 0; }

.section-label { font-size: 10px; font-family: monospace; color: #999; margin-bottom: 6px; }

.details-card { background: #fff; padding: 2rem 2.5rem; border-left: 3px solid #4169E1; max-width: 280px; }
.details-card h2 { font-family: 'Montserrat', sans-serif; font-size: 2rem; text-transform: uppercase; margin-bottom: .8rem; color: #000; }
.details-card p { font-size: 1.5rem; color: #555; margin-bottom: 0; }

.gold-card { background: #000; border: 1px solid #C9A84C; padding: 2rem 2.5rem; max-width: 260px; }
.gold-card h2 { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; text-transform: uppercase; color: #C9A84C; margin-bottom: .8rem; }
.gold-card p { font-size: 1.4rem; color: #c9d1d9; margin-bottom: 0; }
</style></head>
<body>
  <div>
    <div class="section-label">Experience Card (dark overlay)</div>
    <div class="experience-card">
      <h2>FastDrywall</h2>
      <p>Suporte e desenvolvimento com SAP Business One, consultas HANA, Crystal Reports.</p>
    </div>
  </div>
  <div>
    <div class="section-label">Details Card (education)</div>
    <div class="details-card">
      <h2>Estácio</h2>
      <p>Bacharelado em Ciência da Computação — 8º semestre.</p>
    </div>
  </div>
  <div>
    <div class="section-label">Gold Accent Card</div>
    <div class="gold-card">
      <h2>Certificação</h2>
      <p>Consultor certificado pela Ramo — SAP Business One.</p>
    </div>
  </div>
</body></html>
