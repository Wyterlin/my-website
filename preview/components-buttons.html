<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 62.5%; }
body { font-family: 'Open Sans', sans-serif; background: #111; padding: 28px 32px; display: flex; gap: 32px; align-items: flex-end; flex-wrap: wrap; }
.group { display: flex; flex-direction: column; gap: 8px; }
.label { font-size: 10px; color: #555; font-family: monospace; letter-spacing: .06em; text-transform: uppercase; }

/* PRIMARY — filled blue */
.btn-primary {
  font-family: 'Open Sans', sans-serif; font-size: 1.4rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: #4169E1; color: #fff; border: none;
  padding: 0 2.8rem; height: 4.8rem; cursor: pointer;
  border-radius: 4px; position: relative; overflow: hidden;
  transition: background 300ms ease, box-shadow 300ms ease;
}
.btn-primary::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,0); transition: background 300ms ease;
}
.btn-primary:hover { background: #2a4db5; box-shadow: 0 4px 20px rgba(65,105,225,0.4); }
.btn-primary:active { transform: translateY(1px); }

/* OUTLINE — Royal Blue stroke */
.btn-outline {
  font-family: 'Open Sans', sans-serif; font-size: 1.4rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: transparent; color: #4169E1;
  border: 1.5px solid #4169E1; padding: 0 2.8rem; height: 4.8rem;
  cursor: pointer; border-radius: 4px; position: relative; overflow: hidden;
  transition: color 300ms ease;
}
.btn-outline::before {
  content: ''; position: absolute; inset: 0;
  background: #4169E1; transform: scaleX(0); transform-origin: left;
  transition: transform 320ms cubic-bezier(.4,0,.2,1);
}
.btn-outline span { position: relative; z-index: 1; }
.btn-outline:hover { color: #fff; }
.btn-outline:hover::before { transform: scaleX(1); }
.btn-outline:active { opacity: .85; }

/* GOLD — accent */
.btn-gold {
  font-family: 'Open Sans', sans-serif; font-size: 1.4rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: transparent; color: #C9A84C;
  border: 1.5px solid #C9A84C; padding: 0 2.8rem; height: 4.8rem;
  cursor: pointer; border-radius: 4px; position: relative; overflow: hidden;
  transition: color 300ms ease, box-shadow 300ms ease;
}
.btn-gold::before {
  content: ''; position: absolute; inset: 0;
  background: #C9A84C; transform: scaleX(0); transform-origin: left;
  transition: transform 320ms cubic-bezier(.4,0,.2,1);
}
.btn-gold span { position: relative; z-index: 1; }
.btn-gold:hover { color: #000; box-shadow: 0 4px 20px rgba(201,168,76,0.3); }
.btn-gold:hover::before { transform: scaleX(1); }

/* GHOST — dark bg text */
.btn-ghost {
  font-family: 'Open Sans', sans-serif; font-size: 1.4rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: transparent; color: #888;
  border: 1.5px solid #333; padding: 0 2.8rem; height: 4.8rem;
  cursor: pointer; border-radius: 4px;
  transition: color 200ms ease, border-color 200ms ease;
}
.btn-ghost:hover { color: #fff; border-color: #666; }

/* BACK TO TOP */
.back-to-top {
  background: #000; width: 48px; height: 48px;
  display: flex; justify-content: center; align-items: center;
  border-radius: 50%; color: #fff; font-size: 2rem; cursor: pointer;
  border: 1.5px solid #4169E1;
  transition: background 200ms ease, transform 200ms ease, box-shadow 200ms ease;
}
.back-to-top:hover { background: #4169E1; transform: translateY(-3px); box-shadow: 0 6px 18px rgba(65,105,225,0.4); }

/* HAMBURGER */
.hamburger {
  background: #4169E1; color: #fff; font-size: 2.2rem;
  width: 44px; height: 44px; display: flex; align-items: center;
  justify-content: center; border-radius: 6px; border: none; cursor: pointer;
  transition: background 200ms ease, transform 200ms ease;
}
.hamburger:hover { background: #2a4db5; transform: scale(1.05); }
</style></head>
<body>

  <div class="group">
    <div class="label">Primary</div>
    <button class="btn-primary">Enviar Mensagem</button>
  </div>

  <div class="group">
    <div class="label">Outline / Slide</div>
    <button class="btn-outline"><span>Ver Projetos</span></button>
  </div>

  <div class="group">
    <div class="label">Gold Accent</div>
    <button class="btn-gold"><span>Certificações</span></button>
  </div>

  <div class="group">
    <div class="label">Ghost</div>
    <button class="btn-ghost">Saiba Mais</button>
  </div>

  <div class="group">
    <div class="label">Back to Top</div>
    <button class="back-to-top">⮍</button>
  </div>

  <div class="group">
    <div class="label">Mobile Menu</div>
    <button class="hamburger">☰</button>
  </div>

</body></html>
