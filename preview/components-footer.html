<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 62.5%; }
body { font-family: 'Open Sans', sans-serif; }
.footer { background: #0d1117; color: #c9d1d9; padding: 30px 20px 16px; }
.footer-content { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 24px; max-width: 700px; }
.footer-brand h2 { color: #4169E1; margin-bottom: 8px; font-size: 1.8rem; pointer-events: none; }
.footer-brand p { color: #6e7681; font-size: 1.4rem; }
.footer-links h4, .footer-social h4 { color: #4169E1; margin-bottom: 8px; font-size: 1.5rem; pointer-events: none; }
.footer-links ul, .footer-social ul { list-style: none; }
.footer-links ul li a, .footer-social ul li a { color: #6e7681; text-decoration: none; font-size: 1.3rem; transition: color 0.3s ease; display: block; margin-bottom: 4px; }
.footer-links ul li a:hover, .footer-social ul li a:hover { color: #4169E1; }
.footer-bottom { border-top: 1px solid #21262d; margin-top: 16px; padding-top: 10px; text-align: center; font-size: 1.2rem; color: #4169E1; }
</style></head>
<body>
<footer class="footer">
  <div class="footer-content">
    <div class="footer-brand">
      <h2>&lt;/&gt; ChristianW$</h2>
      <p>Conectando código, café e criatividade.</p>
    </div>
    <div class="footer-links">
      <h4>Recursos</h4>
      <ul>
        <li><a href="#">Documentação</a></li>
        <li><a href="#">Repositórios</a></li>
        <li><a href="#">Blog Dev</a></li>
      </ul>
    </div>
    <div class="footer-social">
      <h4>Contato</h4>
      <ul>
        <li><a href="#">LinkedIn</a></li>
        <li><a href="#">GitHub</a></li>
      </ul>
    </div>
  </div>
  <div class="footer-bottom"><p>&copy; 2025 ChristianW$ — Todos os direitos reservados.</p></div>
</footer>
</body></html>
