<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 62.5%; }
body { font-family: 'Open Sans', sans-serif; background: #000; padding: 24px; }
.form-field { position: relative; padding: 15px 0 0; margin-top: 20px; width: 100%; max-width: 400px; }
.input-field { font-family: inherit; width: 100%; border: 0; border-bottom: 2px solid #4169E1; outline: 0; font-size: 1.6rem; color: #fff; padding: 7px 0; background: transparent; transition: border-color 0.2s; }
.input-field::placeholder { color: transparent; }
.input-field:placeholder-shown ~ .form-label { font-size: 2rem; cursor: text; top: 20px; }
.form-label { position: absolute; top: 0; display: block; transition: 0.2s; font-size: 1.7rem; color: #6e7681; pointer-events: none; }
.input-field:focus ~ .form-label { font-size: 1.3rem; top: 0; color: #4169E1; font-weight: 700; }
.input-field:focus { font-weight: 700; border-image: linear-gradient(to right, #000, #4169E1); border-image-slice: 1; }
.input-field:required, .input-field:invalid { box-shadow: none; }
textarea.input-field { resize: none; height: 80px; }
</style></head>
<body>
  <div class="form-field">
    <input class="input-field" type="text" placeholder="Nome" id="name">
    <label class="form-label" for="name">Nome</label>
  </div>
  <div class="form-field">
    <input class="input-field" type="email" placeholder="E-mail" id="email">
    <label class="form-label" for="email">E-mail</label>
  </div>
  <div class="form-field">
    <textarea class="input-field" placeholder="Mensagem" id="msg"></textarea>
    <label class="form-label" for="msg">Mensagem</label>
  </div>
</body></html>
