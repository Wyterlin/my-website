<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 62.5%; }
body { font-family: 'Open Sans', sans-serif; background: #fff; padding: 20px 24px; }
.row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid #f0f0f0; padding: 10px 0; }
.row:last-child { border-bottom: none; }
.label { font-size: 10px; color: #aaa; min-width: 80px; font-family: monospace; flex-shrink: 0; }
.body-xl  { font-size: 2.5rem; line-height: 1.5; color: #000; }
.body-md  { font-size: 2rem;   line-height: 1.5; color: #000; }
.body-sm  { font-size: 1.7rem; line-height: 1.5; color: #6e7681; }
.body-xs  { font-size: 1.3rem; line-height: 1.5; color: #6e7681; }
.nav-link { font-size: 1.8rem; color: #000; text-decoration: none; position: relative; display: inline-block; }
.nav-link::after { content:''; display:block; position:absolute; bottom:0; right:50%; width:100%; height:2px; background:#4169E1; transform:translateX(50%); }
.code { font-family: monospace; font-size: 1.8rem; color: #4169E1; }
</style></head>
<body>
  <div class="row"><span class="label">body-xl · 25px</span><span class="body-xl">Sou um profissional da área de TI.</span></div>
  <div class="row"><span class="label">body · 20px</span><span class="body-md">Open Sans Regular — body copy and descriptions</span></div>
  <div class="row"><span class="label">body-sm · 17px</span><span class="body-sm">Form labels, secondary text, footer body</span></div>
  <div class="row"><span class="label">body-xs · 13px</span><span class="body-xs">Footer legal, micro copy, captions</span></div>
  <div class="row"><span class="label">nav · 18px</span><a class="nav-link" href="#">Perfil</a></div>
  <div class="row"><span class="label">code · brand</span><span class="code">&lt;/&gt; ChristianW$</span></div>
</body></html>
