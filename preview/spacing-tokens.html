<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 62.5%; }
body { font-family: 'Open Sans', sans-serif; background: #f8f8f8; padding: 16px; }
.section { margin-bottom: 14px; }
.title { font-size: 10px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.bar-wrap { flex: 1; background: #e8e8e8; border-radius: 3px; height: 20px; }
.bar { height: 100%; background: #4169E1; border-radius: 3px; opacity: .85; }
.label { font-size: 10px; color: #555; min-width: 130px; font-family: monospace; }
.val { font-size: 10px; color: #999; }
.radius-row { display: flex; gap: 10px; align-items: center; }
.r-box { background: #4169E1; opacity:.75; width: 40px; height: 40px; }
.r-label { font-size: 10px; color: #555; font-family: monospace; }
</style></head>
<body>
<div class="section">
  <div class="title">Spacing Tokens</div>
  <div class="row"><span class="label">--gap-sm · 1.5rem</span><div class="bar-wrap"><div class="bar" style="width:5%"></div></div><span class="val">15px</span></div>
  <div class="row"><span class="label">--gap · 3rem</span><div class="bar-wrap"><div class="bar" style="width:10%"></div></div><span class="val">30px</span></div>
  <div class="row"><span class="label">--gap-lg · 5rem</span><div class="bar-wrap"><div class="bar" style="width:17%"></div></div><span class="val">50px</span></div>
  <div class="row"><span class="label">--gap-xl · 10rem</span><div class="bar-wrap"><div class="bar" style="width:33%"></div></div><span class="val">100px</span></div>
  <div class="row"><span class="label">section · 100vh</span><div class="bar-wrap"><div class="bar" style="width:100%"></div></div><span class="val">Full viewport</span></div>
</div>
<div class="section">
  <div class="title">Border Radii</div>
  <div class="radius-row">
    <div><div class="r-box" style="border-radius:10%"></div><div class="r-label">10% · mobile btn</div></div>
    <div><div class="r-box" style="border-radius:6px"></div><div class="r-label">6px · small</div></div>
    <div><div class="r-box" style="border-radius:30px"></div><div class="r-label">3rem · card</div></div>
    <div><div class="r-box" style="border-radius:50%"></div><div class="r-label">50% · back-to-top</div></div>
  </div>
</div>
</body></html>
